# Jarvis Voice Assistant Configuration

# Path to the Vosk speech recognition model directory.
# Download a model from https://alphacephei.com/vosk/models
# and unzip it into src/main/resources/model/
jarvis.model.path=src/main/resources/model

# Display name for the assistant
jarvis.name=Jarvis

# TTS — Daniel is a British male voice (closest to JARVIS). Run `say -v ?` for options.
jarvis.tts.voice=Daniel
jarvis.tts.rate=160

# Ollama / Gemma configuration
jarvis.ollama.url=http://localhost:11434
jarvis.ollama.model=gemma3:4b

# Web server
server.port=8080

# Logging configuration (reduce noise from Spring during runtime)
logging.level.root=WARN
logging.level.com.jarvis=INFO
