<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>J.A.R.V.I.S.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Ambient hologram layers -->
  <div class="ambient"></div>
  <div class="scanlines"></div>
  <div class="vignette"></div>

  <!-- Minimal HUD: wordmark + status -->
  <header class="hud">
    <span class="wordmark">J.A.R.V.I.S.</span>
    <span class="status" id="status">
      <span class="status-dot" id="status-dot"></span>
      <span class="status-label" id="status-label">ONLINE</span>
    </span>
  </header>

  <!-- The orb -->
  <main class="stage">
    <canvas id="neural-core" class="neural-core"></canvas>
    <div class="core-label" id="wave-label">STANDBY</div>
  </main>

  <!-- Floating conversation, just above the command bar -->
  <div class="convo" id="convo">
    <div class="convo-you" id="convo-you"></div>
    <div class="convo-jarvis" id="convo-jarvis"></div>
  </div>

  <!-- Command bar -->
  <form class="command-bar" id="command-bar" autocomplete="off">
    <button type="button" class="mic-btn" id="mic-btn" title="Speak to JARVIS" aria-label="Voice input">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
        <rect x="9" y="3" width="6" height="11" rx="3"/>
        <path d="M6 11a6 6 0 0 0 12 0M12 17v4"/>
      </svg>
    </button>
    <input id="text-input" type="text" placeholder="Speak or type a command…" spellcheck="false" />
    <button type="submit" class="send-btn" id="send-btn" aria-label="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 12h15M13 6l6 6-6 6"/>
      </svg>
    </button>
  </form>

  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
  <script src="neural-core.js"></script>
  <script src="app.js"></script>
</body>
</html>
